# Cloud Run Service configuration for Samriddhi Parivar
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: samriddhi-parivar
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - resources:
            limits:
              cpu: 1000m
              memory: 512Mi
